name: Build and Deploy Calorie Counter

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Глобальные переменные окружения
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ===== ЗАДАНИЕ 1: Сборка и тесты =====
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout кода
        uses: actions/checkout@v4

      - name: ⚙️ Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Установка зависимостей
        run: npm ci

      - name: 🔍 Линтинг кода
        run: npm run lint --if-present

      - name: 🧪 Запуск тестов (если есть)
        run: npm test --if-present

      - name: 🏗️ Сборка приложения
        run: npm run build

      - name: 📁 Сохранение артефактов сборки
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/

  # ===== ЗАДАНИЕ 2: Сборка и публикация Docker-образа =====
  build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout кода
        uses: actions/checkout@v4

      # 1. Настраиваем QEMU (для поддержки разных архитектур, опционально но полезно)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. Настраиваем Buildx (создает правильный драйвер)
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Авторизация в GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: 🏷️ Метаданные образа
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            latest

      - name: 🐳 Сборка и публикация образа
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

    # ===== ЗАДАНИЕ 3: Деплой (Эмуляция для локальной VM) =====
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # Убрали условие strict host check, теперь job выполнится всегда
    steps:
      - name: 📥 Checkout кода
        uses: actions/checkout@v4

      - name: 🚀 Подготовка к деплою (Эмуляция)
        run: |
          echo "✅ Образ успешно собран и опубликован: ghcr.io/${{ github.repository }}:latest"
          echo ""
          echo "📋 Конфигурация для деплоя на локальный сервер готова:"
          echo "   - SSH ключ настроен в секретах DEPLOY_SSH_KEY"
          echo "   - Скрипт деплоя использует docker-compose"
          echo ""
          echo "⚠️ Примечание: Прямой доступ к локальной VM (192.168.x.x) из GitHub Actions невозможен"
          echo "   без настройки туннелей. Деплой выполняется вручную на целевой машине."
          echo ""
          echo "🧪 Инструкция для ручного деплоя (выполняется на сервере):"
          echo "   mkdir -p /opt/calorie-counter"
          echo "   docker login ghcr.io -u DariaVerseau"
          echo "   docker run -d -p 80:80 ghcr.io/${{ github.repository }}:latest"
          echo ""
          echo "🎉 Статус: Приложение готово к развёртыванию!"

      # Опционально: можно раскомментировать, если хотите проверить сборку локально в раннере
      # - name: 🧪 Тестовый запуск в среде CI
      #   run: |
      #     docker run --rm -d -p 8080:80 ghcr.io/${{ github.repository }}:latest
      #     sleep 5
      #     curl -f http://localhost:8080 || echo "App started but not responding immediately"
